name: mass_marsh_app
description: "MassMarsh Flutter app for offline marsh monitoring data collection."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  riverpod: ^3.0.3
  flutter_riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3

  # Local database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # HTTP & networking
  dio: ^5.3.0
  connectivity_plus: ^7.0.0

  # Authentication & security
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1

  # Form & validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Location & mapping
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0

  # Camera & image
  image_picker: ^1.0.4
  flutter_image_compress: ^2.4.0
  image: ^4.0.17

  # File handling
  file_picker: ^10.3.10
  open_file: ^3.5.0
  share_plus: ^12.0.1

  # Date/time
  intl: ^0.20.2

  # Logging
  logger: ^2.0.0

  # Background tasks
  workmanager: ^0.9.0+3

  # JSON serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0

  # UUID generation
  uuid: ^4.0.0

  # Material Design
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  json_serializable: ^6.7.0
  freezed: ^3.2.5

  # Testing
  mockito: ^5.4.2
  mocktail: ^1.0.0

  # Code quality
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
